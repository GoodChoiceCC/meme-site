<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crime Scene — Case #0047</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background: #1a1510;
      color: #c8b898;
      font-family: 'Courier New', Courier, monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 16px;
    }

    .page-header {
      background: #c8a860;
      width: 100%;
      max-width: 800px;
      padding: 10px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2px;
    }
    .page-header .left { font-size: .7rem; color: #6a5020; }
    .page-header .title { font-size: .95rem; color: #1a1008; font-weight: bold; letter-spacing: .05em; }
    .page-header .right { font-size: .65rem; color: #8a7030; }

    .instructions {
      background: #2a2018;
      border: 1px solid #3a3020;
      padding: 10px 16px;
      font-size: .75rem;
      color: #a89878;
      width: 100%;
      max-width: 800px;
      margin-bottom: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .scene-container {
      width: 100%;
      max-width: 800px;
      height: 480px;
      position: relative;
      overflow: hidden;
      cursor: crosshair;
      user-select: none;
    }

    /* ROOM LAYOUT */
    .room {
      position: absolute;
      inset: 0;
    }

    /* Wall */
    .wall {
      position: absolute;
      left:0; right:0; top:0;
      height: 62%;
      background: #6a6050;
      background-image: repeating-linear-gradient(
        90deg, transparent 0px, transparent 79px, rgba(0,0,0,.05) 79px, rgba(0,0,0,.05) 80px
      );
    }
    .baseboard {
      position: absolute;
      left:0; right:0;
      height: 14px;
      top: 62%;
      background: #3a3028;
      border-top: 2px solid #4a4030;
      border-bottom: 2px solid #2a2018;
    }
    /* Floor */
    .floor {
      position: absolute;
      left:0; right:0;
      top: calc(62% + 14px);
      bottom: 0;
      background: #3a3020;
      background-image:
        repeating-linear-gradient(90deg, transparent 0px, transparent 59px, rgba(0,0,0,.1) 59px, rgba(0,0,0,.1) 60px),
        repeating-linear-gradient(transparent 0px, transparent 59px, rgba(0,0,0,.08) 59px, rgba(0,0,0,.08) 60px);
    }

    /* WINDOW */
    .window-elem {
      position: absolute;
      left: 60px; top: 40px;
      width: 130px; height: 120px;
      background: #3a5080;
      border: 8px solid #4a4030;
      box-shadow: inset 0 0 20px rgba(0,0,0,.5);
    }
    .window-elem::before {
      content:'';
      position:absolute;
      left:50%; top:0; bottom:0;
      width:4px; background:#4a4030; margin-left:-2px;
    }
    .window-elem::after {
      content:'';
      position:absolute;
      top:50%; left:0; right:0;
      height:4px; background:#4a4030; margin-top:-2px;
    }
    /* Moonlight shaft */
    .moonbeam {
      position: absolute;
      left: 80px; top: 160px;
      width: 60px; height: 120px;
      background: linear-gradient(to bottom, rgba(150,160,200,.15), transparent);
      transform: skewX(-10deg);
      pointer-events: none;
    }

    /* PAINTING of John Pork */
    .painting {
      position: absolute;
      right: 80px; top: 35px;
      width: 90px; height: 100px;
      background: #2a2018;
      border: 6px solid #6a5830;
      display: flex; align-items: center; justify-content: center;
      flex-direction: column;
      font-size: 2.5rem;
    }
    .painting::after {
      content: 'J.P. (1990–2023)';
      font-size: .38rem;
      color: #6a5830;
      position: absolute;
      bottom: -16px;
      left: 50%;
      transform: translateX(-50%);
      white-space: nowrap;
    }
    .painting::before {
      content: '';
      position: absolute;
      top:-18px; left:50%;
      transform:translateX(-50%);
      width:8px;height:14px;
      background:#8a7830;
    }

    /* BOOKSHELF */
    .bookshelf {
      position: absolute;
      right: 20px; top: 160px;
      width: 70px; height: 130px;
      background: #5a4828;
      border: 3px solid #3a3018;
      display: flex; flex-direction: column; justify-content: flex-end;
      padding: 4px;
      gap: 2px;
    }
    .book { height: 16px; border-radius: 2px 0 0 2px; }

    /* DESK */
    .desk {
      position: absolute;
      left: 180px; top: 310px;
      width: 220px; height: 100px;
      background: #5a4828;
      border: 3px solid #3a3018;
      border-top: 8px solid #6a5830;
    }
    .desk-leg { position:absolute; bottom:0; width:10px; height:20px; background:#4a3820; }
    .desk::before { content:''; position:absolute; bottom:-20px; left:10px; width:10px; height:20px; background:#4a3820; }
    .desk::after { content:''; position:absolute; bottom:-20px; right:10px; width:10px; height:20px; background:#4a3820; }

    /* PHONE on desk */
    .phone-on-desk {
      position: absolute;
      left: 220px; top: 288px;
      font-size: 1.8rem;
      filter: grayscale(.5);
      z-index: 5;
    }

    /* CHALK OUTLINE */
    .chalk-outline {
      position: absolute;
      left: 420px; top: 330px;
      width: 160px; height: 110px;
      border: 2px dashed rgba(240,240,240,.35);
      border-radius: 50% 50% 40% 40% / 60% 60% 40% 40%;
      transform: rotate(-15deg);
    }
    .chalk-outline::after {
      content: '🐷';
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%,-50%) rotate(90deg);
      font-size: 2rem;
      opacity: .2;
    }

    /* RUG */
    .rug {
      position: absolute;
      left: 400px; top: 320px;
      width: 200px; height: 130px;
      background: #5a3020;
      border: 4px solid #4a2818;
      border-radius: 8px;
      background-image: repeating-linear-gradient(45deg, transparent 0, transparent 8px, rgba(0,0,0,.15) 8px, rgba(0,0,0,.15) 9px);
      z-index: 1;
    }

    /* HOTSPOTS — invisible, clickable */
    .hotspot {
      position: absolute;
      width: 50px; height: 50px;
      cursor: crosshair;
      z-index: 20;
      border-radius: 50%;
      transition: background .2s;
    }
    .hotspot:hover { background: rgba(255,255,200,.08); box-shadow: 0 0 15px rgba(255,255,200,.15); }
    .hotspot.found { cursor: default; background: rgba(100,200,100,.1); pointer-events: none; }
    .hotspot.found::after { content:'✓'; position:absolute; top:50%;left:50%;transform:translate(-50%,-50%); color:#88ee88; font-size:1rem; }

    /* Tooltip on hover */
    .hotspot::before {
      content: attr(data-hint);
      position: absolute;
      bottom: 110%;
      left: 50%;
      transform: translateX(-50%);
      background: #1a1510;
      color: #c8b880;
      font-size: .6rem;
      padding: 3px 8px;
      white-space: nowrap;
      border: 1px solid #3a3020;
      opacity: 0;
      pointer-events: none;
      transition: opacity .2s;
    }
    .hotspot:hover::before { opacity: 1; }

    /* FOUND FLASH */
    .found-flash {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%,-50%);
      background: #1a1510;
      border: 2px solid #88aa66;
      padding: 16px 28px;
      font-size: .9rem;
      color: #88ee88;
      z-index: 100;
      text-align: center;
      display: none;
      animation: flash-in .3s ease-out;
      pointer-events: none;
    }
    @keyframes flash-in { from{transform:translate(-50%,-50%) scale(.7);opacity:0} to{transform:translate(-50%,-50%) scale(1);opacity:1} }

    /* Evidence log panel */
    .evidence-panel {
      background: #2a2018;
      width: 100%;
      max-width: 800px;
      padding: 10px 16px;
      margin-top: 2px;
      font-size: .72rem;
    }
    .evidence-panel h4 { color: #8a7030; letter-spacing: .15em; text-transform: uppercase; font-size: .6rem; margin-bottom: 6px; }
    .evidence-items { display: flex; gap: 10px; flex-wrap: wrap; }
    .ev-item { background: #3a3020; border: 1px solid #5a4828; padding: 4px 10px; color: #a89868; font-size: .68rem; }
    .ev-item.found { background: #1a2a18; border-color: #4a6840; color: #88aa66; }

    .nav-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%; max-width: 800px;
      margin-top: 8px;
    }
    .nav-bar a { font-size:.65rem; color:#6a5828; text-decoration:none; }
    .nav-bar a:hover { color:#c8b880; }
    .proceed-btn {
      background: #2a2010;
      color: #c8b880;
      border: none;
      padding: 10px 24px;
      font-family: inherit;
      font-size: .75rem;
      letter-spacing: .15em;
      text-transform: uppercase;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      opacity: .4;
      pointer-events: none;
      transition: opacity .3s, background .2s;
    }
    .proceed-btn.active { opacity: 1; pointer-events: all; }
    .proceed-btn.active:hover { background: #3a3020; }
  </style>
</head>
<body>
  <div class="page-header">
    <div class="left">◀ <a href="index.html" style="color:#6a5020;text-decoration:none">Case File</a></div>
    <div class="title">CRIME SCENE INVESTIGATION</div>
    <div class="right">Step 1 of 5</div>
  </div>

  <div class="instructions">
    <span>🔍 Search the crime scene. Find all 5 pieces of evidence. Hover to investigate. Click to collect.</span>
    <span id="found-counter" style="color:#88aa66;font-weight:bold">0 / 5 found</span>
  </div>

  <div class="scene-container">
    <div class="room">
      <div class="wall"></div>
      <div class="baseboard"></div>
      <div class="floor"></div>
      <div class="moonbeam"></div>

      <div class="window-elem"></div>
      <div class="painting">🐷</div>
      <div class="bookshelf">
        <div class="book" style="background:#8a3020"></div>
        <div class="book" style="background:#2a5048"></div>
        <div class="book" style="background:#6a6020"></div>
        <div class="book" style="background:#4a3048"></div>
        <div class="book" style="background:#3a4860"></div>
        <div class="book" style="background:#7a4820"></div>
      </div>

      <div class="rug"></div>
      <div class="chalk-outline"></div>

      <div class="desk"></div>
      <div class="phone-on-desk">📞</div>

      <!-- HOTSPOT 1: feather near window -->
      <div class="hotspot" id="hs-feather" style="left:100px;top:155px" data-hint="Something near the window..."
           onclick="collect('feather','🪶 Black feather — from a crow or something with wings')"></div>

      <!-- HOTSPOT 2: phone on desk -->
      <div class="hotspot" id="hs-phone" style="left:205px;top:278px" data-hint="Investigate the phone..."
           onclick="collect('phone','📱 John Pork\'s phone — 47 missed calls logged')"></div>

      <!-- HOTSPOT 3: note in bookshelf -->
      <div class="hotspot" id="hs-note" style="left:705px;top:165px" data-hint="Something in the bookshelf..."
           onclick="collect('note','📝 Crumpled note — &quot;47 Daves were present&quot;')"></div>

      <!-- HOTSPOT 4: cheese crumb on rug -->
      <div class="hotspot" id="hs-cheese" style="left:410px;top:360px" data-hint="Something on the rug..."
           onclick="collect('cheese','🧀 Cheese crumb — distinct cheddar variety. Still warm.')"></div>

      <!-- HOTSPOT 5: footprint near chalk outline -->
      <div class="hotspot" id="hs-footprint" style="left:540px;top:415px" data-hint="Something near the outline..."
           onclick="collect('footprint','👣 Strange footprint — not pig, not human. Mouse-sized.')"></div>

      <!-- Hidden 6th: the painting has a scratch mark -->
      <div class="hotspot" id="hs-painting" style="left:668px;top:30px;width:110px;height:110px;border-radius:0" data-hint="Look at the painting..."
           onclick="collect('painting','🖼️ Scratch mark on painting frame — claw marks, consistent with rodent')"></div>
    </div>
  </div>

  <div class="evidence-panel">
    <h4>Evidence Log</h4>
    <div class="evidence-items">
      <div class="ev-item" id="ev-feather">🪶 Feather</div>
      <div class="ev-item" id="ev-phone">📱 Phone</div>
      <div class="ev-item" id="ev-note">📝 Note</div>
      <div class="ev-item" id="ev-cheese">🧀 Cheese</div>
      <div class="ev-item" id="ev-footprint">👣 Footprint</div>
      <div class="ev-item" id="ev-painting">🖼️ Scratch mark</div>
    </div>
  </div>

  <div class="nav-bar">
    <a href="index.html">← Back to Case File</a>
    <a href="fingerprint.html" class="proceed-btn" id="proceedbtn">Proceed to Lab →</a>
  </div>

  <div class="found-flash" id="flash"></div>

  <script>
    const NEEDED = 5;
    let found = JSON.parse(localStorage.getItem('jpc_evidence') || '[]');

    function updateDisplay() {
      document.getElementById('found-counter').textContent = found.length + ' / 6 found';
      found.forEach(id => {
        const hs = document.getElementById('hs-' + id);
        if (hs) hs.classList.add('found');
        const ev = document.getElementById('ev-' + id);
        if (ev) ev.classList.add('found');
      });
      if (found.length >= NEEDED) {
        document.getElementById('proceedbtn').classList.add('active');
        markStepDone();
      }
    }

    function collect(id, label) {
      if (found.includes(id)) return;
      found.push(id);
      localStorage.setItem('jpc_evidence', JSON.stringify(found));

      const flash = document.getElementById('flash');
      flash.innerHTML = '✔ EVIDENCE COLLECTED<br><span style="font-size:.75rem;color:#c8b880">' + label + '</span>';
      flash.style.display = 'block';
      setTimeout(() => flash.style.display = 'none', 2200);

      updateDisplay();
    }

    function markStepDone() {
      const done = JSON.parse(localStorage.getItem('jpc_completed') || '[]');
      if (!done.includes('scene')) {
        done.push('scene');
        localStorage.setItem('jpc_completed', JSON.stringify(done));
      }
    }

    updateDisplay();
  </script>
</body>
</html>
